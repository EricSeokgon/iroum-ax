# CodeQL 보안 스캔 워크플로우
# Python + Go 코드베이스에 대해 GitHub Advanced Security 자동 분석을 수행합니다.
# 결과는 Security 탭에 표시되며, 취약점 발견 시 PR/issue로 자동 알림됩니다.

name: CodeQL Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 매주 월요일 09:00 KST (00:00 UTC) — 새 CVE 반영
    - cron: '0 0 * * 1'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: CodeQL ${{ matrix.language }} 분석
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['python', 'go']

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Go 1.25 설정
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go.sum

      - name: CodeQL 초기화
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Python: 기본 쿼리 + extended (security-and-quality)
          # Go: 기본 쿼리 + security-extended
          queries: security-and-quality

      # Python: setup-python 만으로 충분 (autobuild 없음)
      # Go: autobuild로 모든 패키지 빌드 → CodeQL이 분석
      - name: Go 자동 빌드
        if: matrix.language == 'go'
        uses: github/codeql-action/autobuild@v3

      - name: CodeQL 분석 실행
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: always

      - name: 분석 결과 요약
        if: always()
        run: |
          echo "## CodeQL ${{ matrix.language }} 분석 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "결과는 [Security 탭](${{ github.server_url }}/${{ github.repository }}/security/code-scanning)에서 확인 가능합니다." >> $GITHUB_STEP_SUMMARY
